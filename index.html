<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Gym Tracker — Hipertrofia</title>
<style>
:root {
  --bg: #f8f8f6; --card: #ffffff;
  --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
  --text: #1a1a1a; --text2: #666; --text3: #aaa;
  --green: #1D9E75; --green-bg: #e1f5ee;
  --blue: #185FA5; --blue-bg: #E6F1FB;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --card: #2a2a2a;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
    --text: #f0f0f0; --text2: #aaa; --text3: #666;
    --green-bg: #0a3d2b; --blue-bg: #0c2d4a;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }
.header { padding: 14px 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 100; }
.app-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
.tabs-wrap { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border-strong); font-size: 13px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text2); transition: all .15s; }
.tab.active { color: #fff; border-color: transparent; }
.nav-pills { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; margin: 0 16px 16px; }
.nav-pill { flex: 1; padding: 8px; border-radius: 6px; border: none; background: transparent; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; }
.nav-pill.active { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.content { padding: 0 16px 100px; }
.day-banner { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.day-banner-title { font-size: 17px; font-weight: 600; }
.day-banner-sub { font-size: 12px; margin-top: 2px; opacity: .75; }
.day-banner-date { font-size: 12px; opacity: .7; text-align: right; line-height: 1.5; }
.stats-row { display: flex; gap: 8px; margin-bottom: 14px; }
.stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 600; }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ex-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; transition: border-color .2s; }
.ex-card.done { border-color: var(--green); background: var(--green-bg); }
.ex-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.ex-target { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.ex-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ex-prev { font-size: 12px; color: var(--text3); flex: 1; line-height: 1.5; }
.ex-prev strong { color: var(--text2); }
.weight-box { display: flex; align-items: center; gap: 5px; }
.weight-input { width: 74px; height: 42px; text-align: center; font-size: 17px; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); padding: 0 4px; -moz-appearance: textfield; }
.weight-input::-webkit-outer-spin-button, .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.weight-unit { font-size: 13px; color: var(--text3); }
.sets-row { display: flex; gap: 7px; flex-wrap: wrap; }
.set-btn { width: 44px; height: 44px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; -webkit-user-select: none; user-select: none; }
.set-btn.done { background: var(--green); border-color: var(--green); color: #fff; }
.set-btn:active { transform: scale(0.92); }
.set-tick { font-size: 16px; }
.notes-input { width: 100%; margin-top: 10px; height: 34px; font-size: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text2); padding: 0 10px; font-family: inherit; }
.notes-input::placeholder { color: var(--text3); }
.save-area { margin-top: 18px; }
.save-btn { width: 100%; padding: 15px; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border-strong); background: var(--card); color: var(--text); transition: all .15s; font-family: inherit; }
.save-btn:active { transform: scale(.98); }
.save-btn.saved { background: var(--green); color: #fff; border-color: var(--green); }
.prog-section { padding-bottom: 20px; }
.prog-header { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.prog-entry { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.prog-date-bar { padding: 9px 14px; background: var(--bg); font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); }
.prog-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-bottom: 1px solid var(--border); }
.prog-row:last-child { border-bottom: none; }
.prog-ex { font-size: 13px; flex: 1; }
.prog-right { display: flex; align-items: center; gap: 10px; }
.prog-w { font-size: 13px; font-weight: 600; }
.prog-s { font-size: 12px; color: var(--text3); }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.7; }
.toast-bar { position: fixed; bottom: -80px; left: 16px; right: 16px; background: var(--green); color: #fff; padding: 14px; border-radius: var(--radius); text-align: center; font-size: 14px; font-weight: 500; transition: bottom .3s cubic-bezier(.4,0,.2,1); z-index: 999; }
.toast-bar.show { bottom: 96px; }
.timer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 998; padding: 10px 16px 14px; }
.timer-main { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.timer-display { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 80px; color: var(--text); transition: color .3s; }
.timer-display.urgent { color: #E24B4A; }
.timer-display.done-color { color: var(--green); }
.timer-controls { display: flex; gap: 6px; flex: 1; justify-content: flex-end; }
.t-btn { height: 40px; min-width: 40px; padding: 0 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .12s; }
.t-btn:active { transform: scale(.93); }
.t-btn.running { background: #E24B4A; color: #fff; border-color: #E24B4A; }
.t-btn.start { background: var(--green); color: #fff; border-color: var(--green); }
.timer-presets { display: flex; gap: 5px; }
.preset-btn { flex: 1; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; }
.preset-btn:active { transform: scale(.93); }
.preset-btn.active-preset { background: var(--blue); color: #fff; border-color: var(--blue); }
.timer-progress { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.timer-progress-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .5s linear, background .3s; }
.timer-progress-fill.urgent { background: #E24B4A; }
.content { padding: 0 16px 160px; }
.info-note { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: var(--text2); line-height: 1.6; }
.progress-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 14px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .3s ease; }

/* DATOS VIEW */
.datos-section { padding-bottom: 30px; }
.datos-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.datos-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; }
.action-btn { width: 100%; padding: 15px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border-strong); background: var(--card); color: var(--text); transition: all .15s; font-family: inherit; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.action-btn:active { transform: scale(.98); }
.action-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.action-btn.green { background: var(--green); color: #fff; border-color: var(--green); }
.icon { font-size: 18px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.backup-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.backup-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; letter-spacing: .03em; }
.backup-textarea { width: 100%; min-height: 100px; font-size: 12px; font-family: monospace; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); padding: 10px; resize: vertical; }
.backup-textarea::placeholder { color: var(--text3); font-family: inherit; font-size: 13px; }
.import-btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--green); background: transparent; color: var(--green); transition: all .15s; font-family: inherit; margin-top: 8px; }
.import-btn:active { background: var(--green); color: #fff; }
.warning-box { background: #fff8e6; border: 1px solid #f5c842; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: #7a5c00; line-height: 1.6; margin-top: 8px; }
@media (prefers-color-scheme: dark) { .warning-box { background: #2a2200; color: #f5c842; border-color: #7a6000; } }
</style>
</head>
<body>

<div class="header">
  <div class="app-title">Gym Tracker — Hipertrofia</div>
  <div class="tabs-wrap" id="tabs"></div>
</div>

<div style="padding: 0 16px; margin-bottom: 12px;">
  <div class="nav-pills">
    <button class="nav-pill active" id="pill-train" onclick="setView('train')">Entrenar</button>
    <button class="nav-pill" id="pill-hist" onclick="setView('hist')">Historial</button>
    <button class="nav-pill" id="pill-datos" onclick="setView('datos')">Datos</button>
  </div>
</div>

<div class="content" id="content"></div>
<div class="timer-bar" id="timer-bar">
  <div class="timer-progress"><div class="timer-progress-fill" id="t-prog" style="width:100%"></div></div>
  <div class="timer-main">
    <div class="timer-display" id="t-display">0:00</div>
    <div class="timer-controls">
      <button class="t-btn" id="t-reset" onclick="timerReset()">↺</button>
      <button class="t-btn start" id="t-toggle" onclick="timerToggle()">▶ Iniciar</button>
    </div>
  </div>
  <div class="timer-presets">
    <button class="preset-btn" onclick="timerSet(60)">1 min</button>
    <button class="preset-btn" id="pre-90" onclick="timerSet(90)">90 seg</button>
    <button class="preset-btn" onclick="timerSet(120)">2 min</button>
    <button class="preset-btn" onclick="timerSet(180)">3 min</button>
    <button class="preset-btn" onclick="timerSet(240)">4 min</button>
  </div>
</div>
<div class="toast-bar" id="toast"></div>

<script>
const DAYS = {
  A: { label:'Push', sub:'Pecho · Hombros · Tríceps', color:'#185FA5', bg:'#daeaf7', textColor:'#0C447C',
    ex:[
      {n:'Press de banca con barra',s:4,r:'4–6',rest:'3–4 min'},
      {n:'Press inclinado mancuernas',s:3,r:'8–12',rest:'2–3 min'},
      {n:'Aperturas en polea cruzada',s:3,r:'12–15',rest:'90 seg'},
      {n:'Press militar con barra (OHP)',s:4,r:'5–8',rest:'3 min'},
      {n:'Elevaciones laterales',s:4,r:'12–15',rest:'90 seg'},
      {n:'Pushdown en polea (tríceps)',s:3,r:'12–15',rest:'90 seg'},
      {n:'Skull crusher / press francés',s:3,r:'10–12',rest:'2 min'},
    ]},
  B: { label:'Pull', sub:'Espalda · Bíceps · Trapecios', color:'#3B6D11', bg:'#d5ecc0', textColor:'#27500A',
    ex:[
      {n:'Peso muerto convencional',s:4,r:'4–6',rest:'3–4 min'},
      {n:'Remo con barra',s:4,r:'6–8',rest:'3 min'},
      {n:'Dominadas con lastre',s:3,r:'6–10',rest:'3 min'},
      {n:'Remo en polea baja',s:3,r:'10–12',rest:'2 min'},
      {n:'Face pull en polea',s:3,r:'15–20',rest:'90 seg'},
      {n:'Curl con barra EZ',s:3,r:'8–12',rest:'2 min'},
      {n:'Curl martillo mancuernas',s:3,r:'10–12',rest:'90 seg'},
    ]},
  C: { label:'Legs', sub:'Cuádriceps · Isquio · Glúteos', color:'#854F0B', bg:'#f5dfc0', textColor:'#633806',
    ex:[
      {n:'Sentadilla trasera (back squat)',s:4,r:'4–6',rest:'3–4 min'},
      {n:'Prensa de piernas 45°',s:3,r:'10–12',rest:'2–3 min'},
      {n:'Extensión cuádriceps máquina',s:3,r:'12–15',rest:'90 seg'},
      {n:'Romanian Deadlift (RDL)',s:4,r:'8–10',rest:'2–3 min'},
      {n:'Curl femoral acostado',s:3,r:'10–12',rest:'2 min'},
      {n:'Hip thrust con barra',s:3,r:'10–12',rest:'2 min'},
      {n:'Elevación gemelos de pie',s:4,r:'12–15',rest:'90 seg'},
    ]},
  D: { label:'Upper+', sub:'Torso completo · Volumen', color:'#534AB7', bg:'#dddcf8', textColor:'#3C3489',
    ex:[
      {n:'Press inclinado con barra',s:4,r:'6–8',rest:'3 min'},
      {n:'Remo mancuerna un brazo',s:4,r:'8–12',rest:'2 min'},
      {n:'Press Arnold mancuernas',s:3,r:'10–12',rest:'2 min'},
      {n:'Aperturas mancuernas plano',s:3,r:'12–15',rest:'90 seg'},
      {n:'Pullover en polea',s:3,r:'12–15',rest:'90 seg'},
      {n:'Elevaciones laterales polea',s:4,r:'15–20',rest:'90 seg'},
      {n:'Curl predicador EZ',s:3,r:'10–12',rest:'2 min'},
      {n:'Extensión tríceps sobre cabeza',s:3,r:'10–12',rest:'2 min'},
    ]},
  E: { label:'Lower+', sub:'Piernas volumen · Core', color:'#993C1D', bg:'#f5d0c2', textColor:'#712B13',
    ex:[
      {n:'Hack squat / Sentadilla frontal',s:4,r:'8–10',rest:'3 min'},
      {n:'Zancadas caminando',s:3,r:'10 c/lado',rest:'2 min'},
      {n:'Curl femoral sentado',s:3,r:'12–15',rest:'90 seg'},
      {n:'Abductores en máquina',s:3,r:'15–20',rest:'90 seg'},
      {n:'Gemelos sentado (sóleo)',s:4,r:'15–20',rest:'90 seg'},
      {n:'Plancha frontal',s:3,r:'45–60 seg',rest:'90 seg'},
      {n:'Crunch en polea',s:3,r:'15–20',rest:'90 seg'},
      {n:'Elevación piernas colgado',s:3,r:'12–15',rest:'90 seg'},
    ]},
};

let curDay = 'A', curView = 'train', session = {};

const todayLabel = () => new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'short'});
const todayKey = () => new Date().toISOString().split('T')[0];
const getLastSession = d => { try { return JSON.parse(localStorage.getItem('last:'+d))||{}; } catch(e){ return {}; } };
const getHistory = d => { try { return JSON.parse(localStorage.getItem('hist:'+d))||[]; } catch(e){ return []; } };
const saveLastSession = (d,v) => localStorage.setItem('last:'+d, JSON.stringify(v));
const saveHistory = (d,v) => localStorage.setItem('hist:'+d, JSON.stringify(v));

function countDone() {
  let total=0, done=0;
  DAYS[curDay].ex.forEach((ex,i) => { total+=ex.s; done+=(session[i]||[]).filter(Boolean).length; });
  return {total,done};
}

function toggleSet(i,s) {
  if(!session[i]) session[i]=[];
  session[i][s]=!session[i][s];
  const btn=document.getElementById('set-'+i+'-'+s);
  if(!btn) return;
  btn.classList.toggle('done', session[i][s]);
  btn.innerHTML = session[i][s] ? '<span class="set-tick">✓</span>' : 'S'+(s+1);
  const card=document.getElementById('excard-'+i);
  const done=(session[i]||[]).filter(Boolean).length;
  card.classList.toggle('done', done>=DAYS[curDay].ex[i].s);
  updateStats();
}

function updateStats() {
  const {total,done}=countDone();
  const el=document.getElementById('stat-done');
  if(el) el.textContent=done+'/'+total;
  const bar=document.getElementById('prog-fill');
  if(bar) bar.style.width=(total?Math.round(done/total*100):0)+'%';
}

function doSave() {
  const day=curDay;
  const record={date:todayKey(), dateLabel:todayLabel(), exData:{}};
  DAYS[day].ex.forEach((ex,i) => {
    const w=document.getElementById('w-'+i);
    const note=document.getElementById('note-'+i);
    record.exData[i]={name:ex.n, weight:w?w.value:'', done:session[i]||[], note:note?note.value:''};
  });
  saveLastSession(day, record.exData);
  let hist=getHistory(day);
  hist.unshift(record);
  if(hist.length>10) hist=hist.slice(0,10);
  saveHistory(day, hist);
  showToast('Sesión guardada');
  const btn=document.getElementById('save-btn');
  if(btn){ btn.classList.add('saved'); btn.textContent='Guardado'; }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function setDay(d) { curDay=d; session={}; renderTabs(); renderContent(); }

function setView(v) {
  curView=v;
  ['train','hist','datos'].forEach(x => document.getElementById('pill-'+x).classList.toggle('active',x===v));
  renderContent();
}

/* ─── EXPORT PDF ─── */
function exportPDF() {
  const allData = {};
  Object.keys(DAYS).forEach(d => { allData[d] = getHistory(d); });
  const hasData = Object.values(allData).some(h=>h.length>0);
  if(!hasData){ showToast('No hay sesiones guardadas aún'); return; }

  const reportDate = new Date().toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'});
  let body = '';

  Object.entries(DAYS).forEach(([dk, day]) => {
    const hist = allData[dk];
    if(!hist.length) return;
    body += `
      <div class="day-section">
        <div class="day-heading" style="background:${day.bg};color:${day.textColor}">
          <span>Día ${dk} — ${day.label}</span>
          <span class="day-sub-pdf">${day.sub}</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Ejercicio</th>
              <th>Peso</th>
              <th>Series</th>
              <th>Notas</th>
            </tr>
          </thead>
          <tbody>`;
    hist.forEach(sess => {
      const rows = Object.values(sess.exData||{});
      rows.forEach((ex, idx) => {
        const sDone=(ex.done||[]).filter(Boolean).length;
        const target=DAYS[dk].ex.find(e=>e.n===ex.name);
        body += `<tr>
          ${idx===0?`<td rowspan="${rows.length}" class="date-cell">${sess.dateLabel||sess.date}</td>`:''}
          <td>${ex.name}</td>
          <td class="num">${ex.weight?ex.weight+' kg':'—'}</td>
          <td class="num">${sDone}/${target?.s||'?'}</td>
          <td class="note-cell">${ex.note||''}</td>
        </tr>`;
      });
    });
    body += `</tbody></table></div>`;
  });

  const html = `<!DOCTYPE html><html lang="es"><head>
  <meta charset="UTF-8">
  <title>Informe Gym — ${reportDate}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12px; color: #1a1a1a; padding: 20px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; }
    .day-section { margin-bottom: 28px; break-inside: avoid; }
    .day-heading { padding: 10px 14px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; }
    .day-sub-pdf { font-size: 11px; font-weight: 400; opacity: .8; }
    table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; border-radius: 0 0 8px 8px; overflow: hidden; }
    th { background: #f5f5f3; padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #555; border-bottom: 1px solid #ddd; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .num { text-align: center; font-weight: 600; }
    .date-cell { background: #fafaf8; font-weight: 600; font-size: 11px; color: #555; vertical-align: top; padding-top: 10px; }
    .note-cell { font-size: 11px; color: #888; font-style: italic; }
    @media print {
      body { padding: 0; }
      .no-print { display: none; }
      .day-section { break-inside: avoid; }
    }
  </style>
  </head><body>
  <h1>Informe de entrenamiento</h1>
  <div class="subtitle">Generado el ${reportDate} · Plan hipertrofia Push/Pull/Legs</div>
  <div class="no-print" style="margin-bottom:20px">
    <button onclick="window.print()" style="padding:10px 20px;font-size:14px;font-weight:600;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;">
      Imprimir / Guardar PDF
    </button>
  </div>
  ${body}
  </body></html>`;

  const win = window.open('','_blank');
  if(win) { win.document.write(html); win.document.close(); }
  else { showToast('Activá los popups para ver el informe'); }
}

/* ─── BACKUP EXPORT ─── */
function exportBackup() {
  const backup = { version: 1, exportDate: new Date().toISOString(), data: {} };
  Object.keys(DAYS).forEach(d => {
    backup.data['last:'+d] = getLastSession(d);
    backup.data['hist:'+d] = getHistory(d);
  });
  const json = JSON.stringify(backup, null, 2);
  const area = document.getElementById('backup-out');
  if(area) { area.value = json; area.select(); }

  try {
    navigator.clipboard.writeText(json).then(() => showToast('Copiado al portapapeles'));
  } catch(e) {
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'gym_backup_'+todayKey()+'.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('Backup descargado');
  }
}

/* ─── BACKUP IMPORT ─── */
function importBackup() {
  const area = document.getElementById('backup-in');
  if(!area||!area.value.trim()){ showToast('Pegá el backup primero'); return; }
  try {
    const backup = JSON.parse(area.value.trim());
    const data = backup.data || backup;
    Object.entries(data).forEach(([k,v]) => { localStorage.setItem(k, JSON.stringify(v)); });
    area.value = '';
    showToast('Backup restaurado correctamente');
    renderContent();
  } catch(e) {
    showToast('Error: el texto no es válido');
  }
}

/* ─── RENDERS ─── */
function renderTabs() {
  document.getElementById('tabs').innerHTML = Object.entries(DAYS).map(([k,d]) => {
    const active = k===curDay;
    return `<button class="tab${active?' active':''}" style="${active?'background:'+d.color+';':''}" onclick="setDay('${k}')">${k} · ${d.label}</button>`;
  }).join('');
}

function renderContent() {
  const c = document.getElementById('content');
  const day = DAYS[curDay];

  if(curView==='train') {
    const last=getLastSession(curDay);
    const {total,done}=countDone();
    let html='';

    html+=`<div class="day-banner" style="background:${day.bg};color:${day.textColor}">
      <div><div class="day-banner-title">${day.label}</div><div class="day-banner-sub">${day.sub}</div></div>
      <div class="day-banner-date">${todayLabel()}</div>
    </div>`;

    html+=`<div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="stat-done">${done}/${total}</div><div class="stat-lbl">Series completadas</div></div>
      <div class="stat-card"><div class="stat-val">${day.ex.length}</div><div class="stat-lbl">Ejercicios</div></div>
    </div>`;

    html+=`<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:${total?Math.round(done/total*100):0}%"></div></div>`;
    html+=`<div class="info-note">Doble progresión: al llegar al tope de reps, subí 2,5 kg la próxima sesión. Descanso compuestos: 3–4 min · Aislamiento: 90 seg.</div>`;

    day.ex.forEach((ex,i) => {
      const prev=last[i]||{};
      const prevW=prev.weight||'';
      const prevDone=(prev.done||[]).filter(Boolean).length;
      const isDone=(session[i]||[]).filter(Boolean).length>=ex.s;

      html+=`<div class="ex-card${isDone?' done':''}" id="excard-${i}">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-target">${ex.s} series × ${ex.r} · descanso ${ex.rest}</div>
        <div class="ex-row">
          <div class="ex-prev">${prevW?`Última: <strong>${prevW} kg</strong> (${prevDone}/${ex.s})` : 'Sin registro previo'}</div>
          <div class="weight-box">
            <input class="weight-input" id="w-${i}" type="number" value="${prevW}" placeholder="0" step="2.5" min="0">
            <span class="weight-unit">kg</span>
          </div>
        </div>
        <div class="sets-row">`;
      for(let s=0;s<ex.s;s++) {
        const done=session[i]&&session[i][s];
        html+=`<button class="set-btn${done?' done':''}" id="set-${i}-${s}" onclick="toggleSet(${i},${s})">${done?'<span class="set-tick">✓</span>':'S'+(s+1)}</button>`;
      }
      html+=`</div>
        <input class="notes-input" id="note-${i}" type="text" placeholder="Notas (ej: me quedé corto en S3)">
      </div>`;
    });

    html+=`<div class="save-area"><button class="save-btn" id="save-btn" onclick="doSave()">Guardar sesión — Día ${curDay} · ${day.label}</button></div>`;
    c.innerHTML=html;

  } else if(curView==='hist') {
    const hist=getHistory(curDay);
    let html=`<div class="prog-section"><div class="prog-header">Historial — Día ${curDay} · ${day.label}</div>`;
    if(!hist.length) {
      html+=`<div class="empty">Sin sesiones guardadas aún.<br>Completá tu primer entrenamiento.</div>`;
    } else {
      hist.forEach(sess => {
        html+=`<div class="prog-entry"><div class="prog-date-bar">${sess.dateLabel||sess.date}</div>`;
        Object.values(sess.exData||{}).forEach(ex => {
          const sDone=(ex.done||[]).filter(Boolean).length;
          const target=DAYS[curDay].ex.find(e=>e.n===ex.name);
          html+=`<div class="prog-row">
            <span class="prog-ex">${ex.name}</span>
            <div class="prog-right">
              <span class="prog-w">${ex.weight?ex.weight+' kg':'—'}</span>
              <span class="prog-s">${sDone}/${target?.s||'?'} series</span>
            </div>
          </div>`;
          if(ex.note) html+=`<div style="padding:5px 14px 8px;font-size:12px;color:var(--text3);font-style:italic">${ex.note}</div>`;
        });
        html+=`</div>`;
      });
    }
    html+=`</div>`;
    c.innerHTML=html;

  } else {
    c.innerHTML=`<div class="datos-section">

      <div class="datos-title">Informe PDF</div>
      <div class="datos-desc">Genera un informe completo de todas tus sesiones, listo para imprimir o guardar como PDF desde el navegador.</div>
      <button class="action-btn primary" onclick="exportPDF()">
        <span class="icon">📄</span> Generar informe PDF
      </button>

      <div class="divider"></div>

      <div class="datos-title">Backup para Claude</div>
      <div class="datos-desc">Exportá todos tus datos como texto JSON. Podés copiarlo y pegarlo en un mensaje a Claude para que analice tu progresión, ajuste el plan, o lo guarde de respaldo.</div>
      <button class="action-btn green" onclick="exportBackup()">
        <span class="icon">📋</span> Exportar datos / copiar
      </button>

      <div class="backup-box" style="margin-top:4px">
        <div class="backup-label">DATOS EXPORTADOS</div>
        <textarea class="backup-textarea" id="backup-out" placeholder="Acá aparecen los datos al presionar Exportar…" readonly></textarea>
      </div>

      <div class="divider"></div>

      <div class="datos-title">Restaurar backup</div>
      <div class="datos-desc">Pegá un backup anterior para recuperar todos tus registros. Útil si cambiaste de navegador o de dispositivo.</div>
      <div class="backup-box">
        <div class="backup-label">PEGÁ EL BACKUP AQUÍ</div>
        <textarea class="backup-textarea" id="backup-in" placeholder='Pegá el texto JSON del backup…'></textarea>
        <button class="import-btn" onclick="importBackup()">Restaurar datos</button>
        <div class="warning-box">Esto reemplaza todos los datos actuales. Hacé un backup primero si tenés sesiones guardadas.</div>
      </div>

    </div>`;
  }
}

/* ─── TIMER ─── */
const REST_MAP = {'3–4 min':210,'3 min':180,'2–3 min':150,'2 min':120,'90 seg':90,'60 seg':60};
let tTotal=90, tRemaining=90, tRunning=false, tInterval=null;

function restSecs(restStr){ return REST_MAP[restStr]||90; }

function timerSet(secs, autoStart=false){
  timerStop();
  tTotal=secs; tRemaining=secs;
  updateTimerUI();
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active-preset', parseInt(b.textContent)*60===secs||
      (b.textContent==='90 seg'&&secs===90)||(b.textContent==='1 min'&&secs===60)||
      (b.textContent==='2 min'&&secs===120)||(b.textContent==='3 min'&&secs===180)||(b.textContent==='4 min'&&secs===240));
  });
  if(autoStart) timerStart();
}

function timerStart(){
  if(tRunning||tRemaining<=0) return;
  tRunning=true;
  const btn=document.getElementById('t-toggle');
  if(btn){btn.textContent='⏸ Pausar';btn.classList.remove('start');btn.classList.add('running');}
  tInterval=setInterval(()=>{
    tRemaining--;
    updateTimerUI();
    if(tRemaining<=0){ timerStop(); timerDone(); }
  },1000);
}

function timerStop(){
  tRunning=false;
  clearInterval(tInterval); tInterval=null;
  const btn=document.getElementById('t-toggle');
  if(btn){btn.textContent='▶ Iniciar';btn.classList.add('start');btn.classList.remove('running');}
}

function timerToggle(){ tRunning?timerStop():timerStart(); }

function timerReset(){
  timerStop();
  tRemaining=tTotal;
  updateTimerUI();
}

function updateTimerUI(){
  const m=Math.floor(tRemaining/60);
  const s=tRemaining%60;
  const disp=document.getElementById('t-display');
  const prog=document.getElementById('t-prog');
  if(disp){
    disp.textContent=m+':'+(s<10?'0':'')+s;
    disp.className='timer-display'+(tRemaining<=10&&tRunning?' urgent':tRemaining===0?' done-color':'');
  }
  if(prog){
    const pct=tTotal>0?Math.round(tRemaining/tTotal*100):100;
    prog.style.width=pct+'%';
    prog.className='timer-progress-fill'+(tRemaining<=10&&tRunning?' urgent':'');
  }
}

function timerDone(){
  tRemaining=0; updateTimerUI();
  beep();
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
  showToast('Descanso terminado — ¡a la siguiente serie!');
}

function beep(){
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.65].forEach((t,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = i===2?880:660;
      g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.25);
    });
  } catch(e){}
}

/* patch toggleSet to auto-start timer */
const _origToggleSet = toggleSet;
window.toggleSet = function(i,s){
  _origToggleSet(i,s);
  if(session[i]&&session[i][s]){
    const ex=DAYS[curDay].ex[i];
    const secs=restSecs(ex.rest);
    timerSet(secs, true);
  }
};

renderTabs();
renderContent();
timerSet(90);
</script>
